<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, minimal-ui">
    <title>歷史系圖書查詢系統</title>
    
    <link href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@6.x/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
    
    <script src="data/db.js"></script>

    <style>
        /* 僅保留少數自訂樣式，大部分由 Vuetify 接管 */
        .pointer-link {
            cursor: pointer;
            text-decoration: underline;
            text-decoration-color: transparent;
            transition: text-decoration-color 0.2s;
        }
        .pointer-link:hover {
            text-decoration-color: currentColor;
        }
        /* 讓表格列在懸停時顯示為可點擊 */
        .v-data-table tbody tr {
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="app">
    <v-app>
        <v-app-bar app color="blue-grey darken-3" dark>
            <v-toolbar-title>歷史系圖書資料庫</v-toolbar-title>
            
            <v-spacer></v-spacer>

            <v-btn 
                v-if="!isLoggedIn" 
                text 
                color="grey" 
                class="text-none"
                @click="loginDialog = true"
            >
                <v-icon left small>mdi-lock-outline</v-icon>
                系統管理
            </v-btn>

            <template v-else>
                <span class="mr-4 text-body-2 grey--text text--lighten-1">已登入 (權限測試)</span>
                <v-btn 
                    outlined 
                    color="red lighten-2" 
                    small
                    @click="logoutDialog = true"
                >
                    登出
                </v-btn>
            </template>
        </v-app-bar>

        <v-main class="grey lighten-4">
            <v-container>
                <v-card class="pa-4 mt-4" elevation="2">
                    <v-text-field
                        v-model="searchQuery"
                        clearable
                        label="請輸入書名或作者關鍵字..."
                        single-line
                        hide-details
                        class="mb-4"
                        outlined
                        dense
                    ></v-text-field>

                    <v-data-table
                        :headers="headers"
                        :items="books"
                        :items-per-page="10"
                        :loading="isLoading"
                        loading-text="資料載入中... 請稍候"
                        no-data-text="目前沒有資料"
                        no-results-text="查無符合條件的圖書"
                        class="elevation-1"
                        @click:row="openModal"
                    >
                        <template v-slot:footer.page-text="items">
                            {{ items.pageStart }} - {{ items.pageStop }} 筆 / 共 {{ items.itemsLength }} 筆
                        </template>
                    </v-data-table>
                </v-card>
            </v-container>
        </v-main>

        <v-overlay :value="isLoading" z-index="9999">
            <div class="text-center">
                <v-progress-circular indeterminate size="64" color="primary"></v-progress-circular>
                <div v-if="progressCount > 0" class="mt-4 text-h6">正在同步圖書資料... ({{ progressCount }} / 47304)</div>
            </div>
        </v-overlay>

        <v-dialog v-model="isModalOpen" max-width="500">
            <v-card v-if="selectedBook">
                <v-card-title class="text-h6 blue-grey lighten-5">
                    書籍詳細資料
                    <v-spacer></v-spacer>
                    <v-btn icon @click="closeModal">
                        <v-icon>mdi-close</v-icon>
                    </v-btn>
                </v-card-title>
                <v-card-text class="pt-4">
                    <v-row v-for="(value, key) in selectedBook" :key="key" class="mb-1 align-center">
                        <v-col cols="4" class="font-weight-bold blue-grey--text text--darken-2">
                            {{ formatKey(key) }}
                        </v-col>
                        <v-col cols="8" class="text-body-1 text-break">
                            <span 
                                :class="{'primary--text font-weight-bold pointer-link': isSearchableField(key) && value}"
                                @click="handleDetailClick(key, value)"
                            >
                                {{ value || '-' }}
                            </span>
                        </v-col>
                    </v-row>
                </v-card-text>
                <v-card-actions>
                    <v-btn color="primary" text @click="closeModal">關閉</v-btn>
                    <v-spacer></v-spacer>
                </v-card-actions>
            </v-card>
        </v-dialog>

        <v-dialog v-model="loginDialog" max-width="400" persistent>
            <v-card>
                <v-card-title class="text-h6 blue-grey darken-3 white--text">
                    管理員登入
                </v-card-title>
                <v-card-text class="pt-6">
                    <v-text-field
                        v-model="loginForm.username"
                        label="帳號"
                        prepend-icon="mdi-account"
                        outlined
                        dense
                    ></v-text-field>
                    <v-text-field
                        v-model="loginForm.password"
                        label="密碼"
                        type="password"
                        prepend-icon="mdi-lock"
                        outlined
                        dense
                        @keyup.enter="submitLogin"
                    ></v-text-field>
                </v-card-text>
                <v-card-actions class="pb-4 px-4">
                    <v-spacer></v-spacer>
                    <v-btn text color="grey darken-1" @click="closeLoginDialog">取消</v-btn>
                    <v-btn color="primary" :loading="isLoggingIn" @click="submitLogin">登入</v-btn>
                </v-card-actions>
            </v-card>
        </v-dialog>

        <v-dialog v-model="logoutDialog" max-width="350">
            <v-card>
                <v-card-title class="text-h6">
                    確認登出
                </v-card-title>
                <v-card-text class="pt-2 text-body-1">
                    您確定要登出系統管理嗎？
                </v-card-text>
                <v-card-actions>
                    <v-spacer></v-spacer>
                    <v-btn text color="grey darken-1" @click="logoutDialog = false">取消</v-btn>
                    <v-btn color="error" @click="submitLogout">確認登出</v-btn>
                </v-card-actions>
            </v-card>
        </v-dialog>

    </v-app>
</div>

<script>
    new Vue({
        el: '#app',
        vuetify: new Vuetify(),
        data: {
            db: null, // 用於保存 IndexedDB 連線實例
            isLoading: true,
            progressCount: 0,
            searchQuery: '',
            searchDebounce: null, // 用於存放 setTimeout 的 ID
            books: [],
            headers: [
                { text: '索書號', value: 'tno', sortable: false },
                { text: '書名', value: 'book_name', sortable: false },
                { text: '作者', value: 'author', sortable: false },
                { text: '館藏位置', value: 'room', sortable: false }
            ],
            isModalOpen: false,
            selectedBook: null,
            fieldLabels: {
                tno: '索書號', book_name: '書名', author: '作者', room: '館藏位置',
                publish: '出版社', year: '出版年份', isbn: 'ISBN', series: '叢書名',
                cat: '分類號'
            },
            jwtToken: localStorage.getItem('lib_jwt') || null,
            loginDialog: false,
            isLoggingIn: false,
            loginForm: { username: '', password: '' },
            logoutDialog: false,
            ws: null
        },
        computed: {
            isLoggedIn() {
                return this.jwtToken !== null && this.jwtToken !== '';
            }
        },
        watch: {
            // 監聽搜尋關鍵字變化
            searchQuery(newQuery) {
                clearTimeout(this.searchDebounce);
                this.isLoading = true;

                this.searchDebounce = setTimeout(async () => {
                    if (!newQuery) {
                        await this.loadAllBooks();
                    } else {
                        await this.performSearch(newQuery);
                    }
                    this.isLoading = false;
                }, 300);
            }
        },
        async created() {
            await initLibraryDB((count) => {
                this.progressCount = count;
                this.isLoading = true; // 在同步時也顯示遮罩
            });
            await this.initAndLoad();
        },
        beforeDestroy() {
            if (this.ws) this.ws.close();
            if (this.db) this.db.close();
        },
        methods: {
            async initAndLoad() {
                try {
                    this.isLoading = true;
                    this.db = await this.openDB();
                    await this.loadAllBooks();
                } catch (err) {
                    console.error("初始化失敗:", err);
                } finally {
                    this.isLoading = false;
                }
            },
            openDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        let store;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            store = db.createObjectStore(STORE_NAME, { keyPath: 'tno' });
                        } else {
                            store = e.target.transaction.objectStore(STORE_NAME);
                        }
                        
                        // 建立新的小寫索引
                        if (!store.indexNames.contains('book_name_lower')) {
                            store.createIndex('book_name_lower', 'book_name_lower', { unique: false });
                        }
                        if (!store.indexNames.contains('author_lower')) {
                            store.createIndex('author_lower', 'author_lower', { unique: false });
                        }

                        // 移除舊的索引
                        if (store.indexNames.contains('book_name')) {
                            store.deleteIndex('book_name');
                        }
                        if (store.indexNames.contains('author')) {
                            store.deleteIndex('author');
                        }
                        console.log("資料表與索引更新成功!");
                    };
                    
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            },
            loadAllBooks() {
                return new Promise((resolve, reject) => {
                    if (!this.db) return reject("資料庫尚未連線");

                    const tx = this.db.transaction(STORE_NAME, 'readonly');
                    const store = tx.objectStore(STORE_NAME);
                    const getAllReq = store.getAll();
                    
                    getAllReq.onsuccess = () => {
                        this.books = getAllReq.result || [];
                        resolve();
                    };
                    getAllReq.onerror = (e) => reject(e.target.error);
                });
            },
            async performSearch(query) {
                if (!this.db) return;

                const lowerCaseQuery = query.toLowerCase();
                const tx = this.db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                
                // 使用新的小寫索引
                const bookNameIndex = store.index('book_name_lower');
                const authorIndex = store.index('author_lower');
                const range = IDBKeyRange.bound(lowerCaseQuery, lowerCaseQuery + '\uffff');

                const bookNamePromise = this.promisifyRequest(bookNameIndex.getAll(range));
                const authorPromise = this.promisifyRequest(authorIndex.getAll(range));

                try {
                    const [bookNameResults, authorResults] = await Promise.all([bookNamePromise, authorPromise]);

                    const results = new Map();
                    bookNameResults.forEach(book => results.set(book.tno, book));
                    authorResults.forEach(book => results.set(book.tno, book));

                    this.books = Array.from(results.values());

                } catch (error) {
                    console.error("搜尋時發生錯誤:", error);
                    this.books = [];
                }
            },
            promisifyRequest(request) {
                return new Promise((resolve, reject) => {
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },
            
            // --- UI 互動邏輯 ---
            openModal(item) {
                this.selectedBook = item;
                this.isModalOpen = true;
            },
            closeModal() {
                this.isModalOpen = false;
                setTimeout(() => { this.selectedBook = null; }, 300);
            },
            formatKey(key) {
                return this.fieldLabels[key] || key;
            },
            isSearchableField(key) {
                return key === 'book_name' || key === 'author';
            },
            handleDetailClick(key, value) {
                if (this.isSearchableField(key) && value) {
                    this.searchQuery = value;
                    this.closeModal();
                }
            },

            // --- 認證與 WebSocket 邏輯 ---
            closeLoginDialog() {
                this.loginDialog = false;
                this.loginForm.password = ''; 
            },
            async submitLogin() {
                if (!this.loginForm.username || !this.loginForm.password) return;
                this.isLoggingIn = true;
                setTimeout(() => {
                    const mockToken = "mock_jwt_header.mock_jwt_payload.mock_jwt_signature";
                    this.jwtToken = mockToken;
                    localStorage.setItem('lib_jwt', mockToken);
                    this.isLoggingIn = false;
                    this.closeLoginDialog();
                    this.loginForm.username = '';
                    this.loginForm.password = '';
                }, 800);
            },
            submitLogout() {
                this.jwtToken = null;
                localStorage.removeItem('lib_jwt');
                if (this.ws) {
                    this.ws.close();
                    this.ws = null;
                }
                this.logoutDialog = false;
            },
            initSecureWebSocket() {
                const wsUrl = 'ws://localhost:8080/ws'; 
                try {
                    this.ws = new WebSocket(wsUrl);
                    this.ws.onopen = () => console.log('WebSocket 安全連線已成功建立');
                    this.ws.onmessage = (event) => {
                        try {
                            const data = JSON.parse(event.data);
                            this.processRealTimeData(data);
                        } catch (e) {
                            console.error('解析 WebSocket 資料失敗:', e);
                        }
                    };
                    this.ws.onerror = (error) => console.error('WebSocket 發生錯誤:', error);
                    this.ws.onclose = () => console.log('WebSocket 連線已關閉');
                } catch (err) {
                    console.error('建立 WebSocket 連線失敗:', err);
                }
            },
            processRealTimeData(data) {
                console.log('接收到即時資料:', data);
            }
        }
    });
</script>
</body>
</html>
